# docker-compose.yml — full AXIOM dev stack, one-command startup: `docker compose up`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
      POSTGRES_DB: axiom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://axiom:axiom@postgres:5432/axiom
      CHROMA_URL: http://chromadb:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    # Run migrations then start the server.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn axiom.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  chromadata:
