# datastores.yaml — PostgreSQL + ChromaDB Deployments, Services, and PVCs.
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.postgres.storage }} } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres
  labels: {{- include "axiom.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - { name: POSTGRES_USER, value: {{ .Values.postgres.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.postgres.password | quote }} }
            - { name: POSTGRES_DB, value: {{ .Values.postgres.db | quote }} }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: {{ .Release.Name }}-postgres }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  selector: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
{{- end }}
{{- if .Values.chromadb.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-chromadb
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.chromadb.storage }} } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-chromadb
  labels: {{- include "axiom.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: chromadb }
  template:
    metadata:
      labels: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: chromadb }
    spec:
      containers:
        - name: chromadb
          image: {{ .Values.chromadb.image }}
          ports: [{ containerPort: 8000 }]
          volumeMounts:
            - { name: data, mountPath: /chroma/chroma }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: {{ .Release.Name }}-chromadb }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-chromadb
spec:
  selector: { app.kubernetes.io/name: axiom, app.kubernetes.io/component: chromadb }
  ports: [{ port: 8000, targetPort: 8000 }]
{{- end }}
